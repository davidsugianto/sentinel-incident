server:
  port: 8080

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  name: sentinel_incident
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

auth:
  jwt_secret: "supersecretjwtkey"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "https://yourdomain.com"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Content-Length"
    - "Accept-Encoding"
    - "X-CSRF-Token"
    - "Authorization"
    - "accept"
    - "origin"
    - "Cache-Control"
    - "X-Requested-With"
    - "AuthToken"
    - "access-token"
    - "x-app-key"
    - "X-Authorization"
    - "Referer"
    - "Keep-Alive"
    - "User-Agent"
    - "If-Modified-Since"
    - "LoginProvider"
    - "X-Jwt-Token"
  allow_credentials: true

slack:
  webhook_url: ""
  enabled: false