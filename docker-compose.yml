services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-incident
    volumes:
      - .:/app
      - go-cache:/go/pkg/mod
      - tmp-data:/app/tmp
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://user:pass@postgres:5432/sentinel_incident?sslmode=disable
      - REDIS_ADDR=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15
    container_name: sentinel-incident-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: sentinel_incident
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sentinel_incident"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel-incident-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: sentinel-incident-migrate
    command: ["-path", "/migrations", "-database", "postgres://user:pass@postgres:5432/sentinel_incident?sslmode=disable", "up"]
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  go-cache:
  tmp-data:
  redis-data: